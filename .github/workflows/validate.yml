name: Validate Faith Harbor OS

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22.5+ is required for the built-in node:sqlite module;
          # 24 matches the development and deployment runtime.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate
